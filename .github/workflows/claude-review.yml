# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
#
# (This workflow complies: it has read-only access to repository contents and
# can only post PR comments.)
#
# --------------------------------------------------------------------------
#
# On-demand Claude code review.
#
# Apply the `claude-review` label to a PR to get a code review from Claude.
# Remove and re-apply the label to request a fresh review after pushing
# changes. Only users with triage access or better can apply labels, so this
# has the same human-in-the-loop property as @claude mentions.
#
# Limitations:
#
# - Fork PRs are not supported: GitHub does not grant the `id-token: write`
#   permission to `pull_request` runs from forks, which Workload Identity
#   Federation requires. (claude.yml also deliberately skips fork PRs at
#   the moment -- see the fork-PR notes there -- so neither workflow runs
#   Claude against fork-controlled code.)
#
# - Authentication and spend isolation work the same way as claude.yml: the
#   `anthropic_*` values are identifiers (not secrets), and usage is billed
#   to a dedicated spend-capped workspace.

name: Claude Review

# Default-deny at the workflow level; the job below declares exactly the
# permissions it needs.
permissions: {}

on:
  pull_request:
    types: [labeled]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review
    if: |
      github.event.label.name == 'claude-review' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # A subset of claude.yml's grants; each is audited, with receipts,
    # directly above the permissions block in claude.yml, alongside the
    # list of explicitly prohibited actions.
    permissions:
      contents: read
      pull-requests: write # post the review (summary + inline comments)
      id-token: write # mint the OIDC identity token for Anthropic WIF
      actions: read # let the review consider CI results
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 1
          # persist-credentials is left at the default (true) deliberately;
          # see the note in claude.yml (claude-code-action#1236). The token
          # persisted here is read-only for contents in any case.

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # WIF identifiers, shared with claude.yml via repo Actions
          # variables (identifiers, not credentials).
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}

          # Use the workflow's own (contents: read) token instead of the
          # Claude GitHub App's exchanged token, which would carry
          # `contents: write` despite this job's read-only permissions.
          # Keeps the job free of write-capable GitHub tokens. The app is
          # deliberately NOT installed on this repository; see the
          # security notes and permissions audit in claude.yml.
          github_token: ${{ github.token }}

          prompt: |
            Review this pull request.

            Focus on:
            - correctness (including subtle compiler-correctness issues:
              soundness, missing cases in matches over IR, effects on
              existing optimizations)
            - adherence to the conventions in AGENTS.md
            - missing or inadequate tests (testsuite/ coverage for behavior
              changes)

            Be concise. Only comment where you have something substantive to
            say; do not pad the review with praise or restatements of the
            diff. Use inline comments for line-specific feedback and a short
            summary comment for overall assessment. Where you have a
            concrete, small, local fix, include it in the inline comment as
            a GitHub suggestion block so the author can apply it with one
            click.


          # Note: this workflow supplies a `prompt`, so the action runs in
          # "agent mode", where the CI-reading tools (mcp__github_ci__*) are
          # only mounted if they appear in --allowedTools AND the workflow
          # token passes the action's runtime probe for `actions: read`
          # (checkActionsReadPermission in src/mcp/install-mcp-server.ts).
          # Listing them here is what makes "consider CI results" work.
          claude_args: |
            --model claude-fable-5
            --effort xhigh
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(rg:*),Bash(cat:*),Bash(ls:*)"
