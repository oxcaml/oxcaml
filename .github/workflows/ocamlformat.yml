# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: ocamlformat
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  check:
    name: check (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: read # read PR labels for the "skip 80ch" check
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            os: warp-ubuntu-latest-x64-32x
    steps:
      - name: Checkout the OxCaml repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout the parent branch
        run: git fetch origin HEAD --deepen 1

      - name: Pretend we're running in a container (makes setup-ocaml go faster)
        run: sudo touch /.dockerenv
        # makes setup-ocaml skip apt-get, which is slow on first invocation

      - name: Set up Opam
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: oxcaml-ci-deps.5.4.0-with-ocaml.5.4.0-with-ocamlformat.0.29.0
          opam-repositories: |
            local: file://${{ github.workspace }}/tools/ci/local-opam
            default: https://github.com/ocaml/opam-repository.git
          opam-disable-sandboxing: true
          opam-pin: false

      - name: 'Check for the "skip 80ch" PR tag'
        if: ${{ contains( github.event.pull_request.labels.*.name, 'skip 80ch') }}
        run: echo SKIP_80CH=y >> "$GITHUB_ENV"

      - name: 'Check for the "skip 80ch" PR tag (merge queue)'
        if: ${{ github.event_name == 'merge_group' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          # HEAD_REF looks like refs/heads/gh-readonly-queue/main/pr-<N>-<sha>
          if [[ "$HEAD_REF" =~ /pr-([0-9]+)- ]]; then
            pr_number="${BASH_REMATCH[1]}"
            if gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" \
                 --json labels --jq '.labels[].name' | grep -qxF 'skip 80ch'; then
              echo SKIP_80CH=y >> "$GITHUB_ENV"
            fi
          else
            echo "Could not parse PR number from '$HEAD_REF'; not skipping 80ch."
          fi

      - name: Check OCaml Formatting
        run: opam exec -- bash tools/ci/actions/check-fmt.sh

      - name: Check for Conflict Markers
        if: ${{ !cancelled() }}
        run: bash tools/ci/actions/check-conflicts.sh
