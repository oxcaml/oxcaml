# This CI check builds and tests Merlin. Running the Merlin tests requires
# having a corresponding compiler. Confusingly, the version of Merlin at OxCaml
# revision X is not meant to work with the compiler at OxCaml revision X.
# Rather, it is usually the most recently tagged version of the compiler. For
# this reason, the CI check checks out the repo at 2 different revisions. This
# will likely change in the near future.

name: merlin
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Overall approach to running the tests:
#  - Install OCaml 5.4, as this is the version of dependencies our merlin expects.
#  - Build flambda-backend (which requires installing OCaml 4.14).
#  - Build merlin using OCaml 5.4, and then run the tests while pointing merlin at
#    flambda-backend's stdlib and ocamlc.
#
# The second step only needs to be run when we update the flambda-backend version,
# so we cache it. We use [upstream/ocaml_flambda/base-rev.txt] as the cache key,
# given that it is updated when and only when we import new changes from
# flambda-backend into merlin-jst.

jobs:
  build:
    # The type of runner that the job will run on
    name: built with flambda-backend, ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flambda-backend-config: --enable-middle-end=flambda2 --disable-naked-pointers
            name: flambda2

    env:
      MERLIN_TESTS: all

    steps:
    - name: Checkout the oxcaml repo
      uses: actions/checkout@master
      with:
        path: 'oxcaml'

    - name: Assert Merlin is in sync with the compiler
      working-directory: oxcaml
      # This script will fail if compiler changes need to be imported into
      # Merlin.
      run: external/merlin/scripts/assert-in-sync.sh

    - name: Pretend we're running in a container (makes setup-ocaml go faster)
      if: runner.os == 'Linux'
      run: sudo touch /.dockerenv
      # makes setup-ocaml skip apt-get, which is slow on first invocation

    - name: Set up Opam
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: oxcaml-ci-deps.5.2.0-with-ocaml.5.4.0-with-ocamlformat.0.29.0
        opam-repositories: |
          local: file://${{ github.workspace }}/oxcaml/tools/ci/local-opam
          default: https://github.com/ocaml/opam-repository.git
        opam-disable-sandboxing: true
        opam-pin: false

    - name: Set up Opam environment
      # this command adds the opam environment to the PATH.
      run: |
        opam env --set-root --set-switch --shell=cmd | sed -n 's/^set //p' | tee -a "$GITHUB_ENV"

    - name: Restore flambda-backend build
      uses: actions/cache/restore@v4
      id: cache
      with:
        path: ${{ github.workspace }}/flambda-backend/_install
        key: cache-flambda-backend-${{ matrix.name }}-${{ hashFiles('oxcaml/external/merlin/upstream/ocaml_flambda/base-rev.txt') }}

    - name: Clone the flambda-backend repo
      uses: actions/checkout@master
      if: steps.cache.outputs.cache-hit != 'true'
      with:
        repository: 'ocaml-flambda/flambda-backend'
        path: 'flambda-backend'

    - name: Check out the flambda-backend repo to the specified hash
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: flambda-backend
      run: |
        REV=$(cat $GITHUB_WORKSPACE/oxcaml/external/merlin/upstream/ocaml_flambda/base-rev.txt)
        git fetch origin "$REV"
        git checkout "$REV"

    - name: Install dependencies for flambda-backend
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: flambda-backend
      run: |
        # We don't need the dev tool parts
        sed -i -e '/ocamlformat\|merlin\|ocaml-lsp-server/d' oxcaml-dev.opam
        opam pin add --yes oxcaml-dev .

    - name: Configure, build, and install flambda-backend
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: flambda-backend
      run: |
        eval $(opam env)
        autoconf
        ./configure \
          --prefix=$GITHUB_WORKSPACE/flambda-backend/_install \
          --with-dune=$(which dune) \
          ${{ matrix.flambda-backend-config }}
        make install
        opam pin remove oxcaml-dev

    - name: Upload flambda-backend cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/flambda-backend/_install
        key: cache-flambda-backend-${{ matrix.name }}-${{ hashFiles('oxcaml/external/merlin/upstream/ocaml_flambda/base-rev.txt') }}

    - name: Install dependencies
      working-directory: oxcaml/external/merlin
      run: |
        opam pin menhirLib 20231231 --no-action
        opam install --yes ppx_string ppx_compare ocamlformat.0.29.0
        opam install . --deps-only --with-test --yes

    - name: Create dune workspace file
      working-directory: oxcaml/external/merlin
      # This will tell dune to treat external/merlin as its own workspace. Once
      # Merlin is kept in sync with the compiler, this should be removed so that
      # Merlin is built in the same workspace as the compiler.
      run: |
        touch dune-workspace

    - name: Check formatting
      working-directory: oxcaml/external/merlin
      run: |
        dune build @fmt

    - name: Build and test in release mode (linux)
      working-directory: oxcaml/external/merlin
      run: |
        export MERLIN_TEST_OCAML_PATH=$GITHUB_WORKSPACE/flambda-backend/_install
        dune build
        dune runtest -p merlin-lib,dot-merlin-reader,merlin,ocaml-index
        if ! git diff --quiet ; then
          echo "The following files were modified by dune:" >&2
          git diff --name-only >&2
          echo "" >&2
          echo "Hint: If this check fails, the likely culprit is
        that you compiled with the wrong menhir version. Cross-check your opam switch's
        menhir version with the one in merlin-lib.opam" >&2
          exit 1
        fi
