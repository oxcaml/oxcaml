# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source
# code repo. If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
#
# (This workflow complies: repository contents are read-only. Claude cannot
# commit or push; it proposes changes as GitHub suggestion blocks and diffs that
# humans review and apply. See .github/claude-code-security.md for the shared
# security model before modifying this file.)
#
# --------------------------------------------------------------------------
#
# Claude Code for pull requests.
#
# Mentioning @claude on a PR (in a comment, review, or review comment)
# triggers a Claude Code session that can answer questions about the code,
# investigate CI failures, and propose changes. Proposals arrive as:
#
#   - GitHub suggestion blocks in inline PR comments (one-click "Commit
#     suggestion"; the resulting commit is authored by the human who clicks),
#     for changes to lines in the PR diff; or
#   - a unified diff in the response comment (apply with `git apply`), for
#     everything else.
#
# GitHub issues are deliberately not supported (we barely use them); this keeps
# the trigger surface and the permission grants PR-only.
#
# See https://github.com/anthropics/claude-code-action for the action's docs.
#
# SECURITY: the shared security model for both Claude workflows -- how WIF
# authentication works, why no write-capable GitHub token exists in the job,
# why the Claude GitHub App is not installed, the actor/fork gating, tag vs.
# agent mode, and the .claude/settings.json behavior -- lives in
# .github/claude-code-security.md. Read it before modifying this file. The
# comments here justify only this file's individual settings and defer there
# for the mechanism.

name: Claude

# Default-deny at the workflow level; the job below declares exactly the
# permissions it needs.
permissions: {}

on:
  issue_comment:
    # PR conversation comments arrive as issue_comment events; the job's `if:`
    # block restricts them to comments on PRs. Plain issues are unsupported.
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    # Manual smoke-test hook: lets maintainers exercise this workflow -- and
    # iterate on the environment setup -- from any branch via the Actions UI,
    # without merging to main first. (GitHub runs `issue_comment` etc. from the
    # default branch only, but `workflow_dispatch` can target any ref once this
    # file exists on main.)
    inputs:
      prompt:
        description: "Task for Claude"
        required: true
        type: string

concurrency:
  # One Claude session at a time per PR; let existing runs finish. (For
  # issue_comment events on a PR, `issue.number` is the PR number.)
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}

jobs:
  claude-response:
    name: Respond
    # Pre-filter: only spin up a runner when @claude is actually mentioned.
    # (Authorization is enforced by the action, not by this condition, and
    # the fork-PR exclusion is enforced by the "Reject PRs in Forks" step, so
    # nothing in this `if:` is security-critical. The head.repo checks on
    # the review events duplicate the guard step's decision for the two
    # payloads that carry the head repo, purely to avoid spinning up a
    # runner; the issue_comment payload does not carry it, so those runs
    # are stopped by the guard step instead.)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.review.body, '@claude'))
    runs-on: warp-ubuntu-latest-x64-8x # CI builder since building is expected.
    timeout-minutes: 90
    permissions:
      # This is the complete grant set; unspecified permissions default to none
      # (workflow-level `permissions: {}` above). Each grant's rationale is one
      # line here; the shared mechanism (and the list of actions these grants
      # deliberately do NOT enable -- push, merge, create/approve PRs, create
      # issues, poison the cache) is in .github/claude-code-security.md.
      contents: read # checkout + let Claude read the tree; read-only is what makes this propose-only
      pull-requests: write # post Claude's response comment and inline suggestion-block comments
      id-token: write # mint the OIDC token for Anthropic WIF; grants no GitHub write access (see doc)
      actions: read # let Claude read CI runs/logs to diagnose failures (CI logs here are already public)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # zizmor: ignore[artipacked]
            # anthropics/claude-code-action runs `git fetch` before configuring
            # its own auth and fails without the persisted token
            # (anthropics/claude-code-action#1236). More importantly, the
            # persisted token is the workflow token above, which is passed into
            # the Claude Code action anyway. For defense in depth, we should set
            # persist-credentials to false once that issue is resolved.

      - name: Reject PRs in Forks
        # The single enforcement point for the fork-PR exclusion (why fork PRs
        # are disabled: see "Fork PRs are not run" in
        # .github/claude-code-security.md). Runs for every trigger except
        # workflow_dispatch and *fails the job* on a fork PR, so all later steps
        # are skipped by GitHub's default status check -- no per-step gating
        # needed. The red X (with the error annotation) is the visible feedback
        # that @claude is disabled there.
        #
        # We ask the API for the head repo rather than reading the event payload
        # because the issue_comment payload does not carry it (verified against
        # GitHub's OpenAPI spec: `issue.pull_request` has only
        # url/html_url/diff_url/patch_url/merged_at, and the top-level
        # `repository` element is the base repo, always equal to
        # github.repository here). The review-event payloads DO carry
        # pull_request.head.repo.full_name, but we deliberately use the one API
        # mechanism for all events so enforcement lives in exactly one place and
        # the job `if:` stays non-security-critical.
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.issue.pull_request.url || github.event.pull_request.url }}
        run: |
          head_repo="$(gh api "$PR_URL" --jq .head.repo.full_name)"
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::@claude is currently disabled on PRs from forks (head repo: $head_repo)."
            exit 1
          fi

      # Claude's build environment is the flake devShell -- the same toolchain
      # as the nix CI builds:

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oxcaml
          # No authToken, deliberately: read-only substitution. Nothing built
          # during a Claude session may ever enter the cache.

      - name: Enter the Nix Flake devShell
        # Exports the devShell environment into GITHUB_ENV/GITHUB_PATH so
        # later steps (including Claude's shell) run inside it.
        uses: nicknovitski/nix-develop@9be7cfb4b10451d3390a75dc18ad0465bed4932a # v1.2.1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1.0.168
        with:
          # Workload Identity Federation identifiers, not credentials (see the
          # WIF section in .github/claude-code-security.md).
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}

          # Pass the workflow's own token so the action does NOT exchange the
          # OIDC token for a write-capable app token. This is half of the
          # "no write-capable token in the job" invariant; see
          # .github/claude-code-security.md.
          github_token: ${{ github.token }}

          # Trigger-weakening knobs pinned empty so loosening requires a visible
          # diff: only write-access humans can trigger. Why '*' for allowed_bots
          # is especially dangerous on a public repo is in the doc's actor-gating
          # section.
          allowed_non_write_users: ""
          allowed_bots: ""

          # The action runs in "interactive (mention) mode" by default, and in
          # "automation mode" when a prompt is supplied. On mention events
          # `inputs.prompt` expands to the empty string, which the action treats
          # as "no prompt" (the mode detector in src/modes/detector.ts checks
          # truthiness), so those runs fall through to @claude-trigger detection
          # as usual; workflow_dispatch runs carry the manual prompt and run in
          # automation mode.
          prompt: ${{ inputs.prompt }}

          # Bash commands and MCP tools Claude may use, additive on top of the
          # action's tag-mode baseline (see "Tag mode vs. agent mode" in
          # .github/claude-code-security.md). Keep tight: anything not
          # pre-allowed is refused; extend deliberately rather than globbing.
          # The inline-comment entry is double duty -- the action only mounts
          # the inline-comment MCP server when this exact tool name appears in
          # --allowedTools, and it is what carries suggestion blocks. The
          # CI-reading tools are omitted because the tag-mode baseline already
          # includes them.
          claude_args: |
            --model claude-fable-5
            --effort xhigh
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(make:*),Bash(autoconf),Bash(./configure:*),Bash(rg:*),Bash(cat:*),Bash(ls:*),Bash(sed -n:*)"
            --append-system-prompt "You do NOT have push access to this repository. Never attempt to create commits, branches, or pushes; they will fail. Propose all changes for humans to review and apply. For changes to lines that appear in the PR diff, post inline review comments containing GitHub suggestion blocks. For all other changes, including new files or lines outside the diff, mention you don't have write permission to the repo and instead include a complete unified diff in a fenced diff code block in your response comment, with paths relative to the repository root, so a maintainer can apply it with git apply."
