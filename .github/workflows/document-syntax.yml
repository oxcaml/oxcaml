# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: Syntax changes reminder

on:
  # This trigger is safe here: the workflow never checks out or runs PR code;
  # it only posts a comment, which needs write permission on fork PRs.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [opened, synchronize, reopened]
    paths:
      - 'parsing/parser.mly'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  remind:
    name: parser-change reminder comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # post the parser-change checklist comment on the PR
    steps:
      - name: Create PR Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REPO=$GITHUB_REPOSITORY
          COMMENT="## Parser Change Checklist

          This PR modifies the parser. Please check that:

          - [ ] \`parsetree/source_jane_street.ml\` has been updated. This test should have examples of every new bit of syntax you are adding. Feel free to just check the box if your PR does not actually change the syntax (because it is refactoring the parser, say).
          - [ ] \`ppxlib\` has been updated internally (if necessary). Breaking \`ppxlib\` blocks others from testing their PRs, so you should not merge until it is fixed."

           # Check if comment already exists
          if ! gh pr view $PR_NUMBER --json comments -q '.comments[].body' --repo $REPO | grep -q "Parser Change Checklist"; then
            gh pr comment $PR_NUMBER --body "$COMMENT" --repo $REPO
            echo "Comment added successfully."
          else
            echo "Comment already exists. Skipping."
          fi
