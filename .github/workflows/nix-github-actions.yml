# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: Nix Flake Actions

on:
  push:
    branches:
      - main
      - '*microbranch'
    tags:
      - '*'
  pull_request:
  merge_group:

jobs:
  nix-matrix:
    runs-on: ${{ github.repository == 'oxcaml/oxcaml' && 'warp-ubuntu-latest-arm64-8x' || 'ubuntu-24.04-arm' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install
      - id: set-matrix
        name: Generate Nix Matrix
        run: |
          set -Eeuo pipefail
          if [ "${{ github.repository }}" = 'oxcaml/oxcaml' ]; then
            filter='.'
          else
            filter='walk(if type == "string" then ({
              "warp-ubuntu-latest-x64-8x":   "ubuntu-latest",
              "warp-ubuntu-latest-x64-32x":  "ubuntu-latest",
              "warp-ubuntu-latest-arm64-8x": "ubuntu-24.04-arm",
              "warp-macos-15-arm64-6x":      "macos-15"
            }[.] // .) else . end)'
          fi
          echo -n 'matrix=' >> "$GITHUB_OUTPUT"
          nix eval --json '.#githubActions.matrix' | jq -c "$filter" | tee -a "$GITHUB_OUTPUT"

  nix-build:
    name: ${{ matrix.name }} (${{ matrix.system }})
    needs: nix-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{fromJSON(needs.nix-matrix.outputs.matrix)}}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install
      - run: nix build -L '.#${{ matrix.attr }}'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
