<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1">
    <title>OxCaml Playground</title>
    <style>
      :root {
        color-scheme: light dark;
        --page: #f2eee7;
        --paper: #fffdf9;
        --editor: #fbfcfd;
        --editor-ink: #1d2733;
        --editor-gutter: #eef2f6;
        --editor-gutter-ink: #687586;
        --editor-gutter-border: rgba(19, 31, 47, 0.1);
        --editor-active: rgba(24, 33, 44, 0.055);
        --editor-selection: rgba(15, 123, 95, 0.18);
        --editor-cursor: #0f7b5f;
        --panel-ink: #18212c;
        --muted: #6d7988;
        --border: rgba(19, 31, 47, 0.12);
        --accent: #c24e2a;
        --accent-strong: #8f3114;
        --ok: #0f7b5f;
        --warn: #b14b2b;
        --shadow: 0 24px 60px rgba(26, 31, 42, 0.12);
        --syntax-keyword: #98521a;
        --syntax-module: #0d638c;
        --syntax-string: #276a3f;
        --syntax-comment: #6d7988;
        --syntax-number: #846000;
        --syntax-operator: #4f5c6b;
        --syntax-function: #0d638c;
        --syntax-parameter: #805514;
        --syntax-type: #0d638c;
        --syntax-constructor: #8a5a00;
        --syntax-property: #7a4d9b;
        --syntax-tag: #b8462b;
        --syntax-annotation: #8c5f16;
        --syntax-package: #007260;
        --syntax-package-open: #475fa5;
        --syntax-label: #8b3aa8;
        --output-panel-bg: rgba(255, 255, 255, 0.84);
        --output-bg: #fffdf9;
        --output-stream: #18212c;
        --output-code: #233040;
        --output-detail: #4f5c6b;
        --output-prefix: #7a8695;
        --output-empty-a: rgba(250, 247, 241, 0.8);
        --output-empty-b: rgba(245, 240, 232, 0.8);
        --output-empty-stripe: rgba(24, 33, 44, 0.018);
        --output-warning-bg: linear-gradient(180deg, rgba(215, 153, 71, 0.08), rgba(255, 255, 255, 0.9));
        --output-error-bg: linear-gradient(180deg, rgba(193, 78, 42, 0.06), rgba(255, 255, 255, 0.9));
        --output-success-bg: linear-gradient(180deg, rgba(15, 123, 95, 0.05), rgba(255, 255, 255, 0.9));
        --interface-bg: rgba(224, 245, 238, 0.55);
        --interface-ink: #173829;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page: #111820;
          --paper: #17202a;
          --editor: #10151d;
          --editor-ink: #ebf3ff;
          --editor-gutter: #0c1118;
          --editor-gutter-ink: #78879c;
          --editor-gutter-border: rgba(255, 255, 255, 0.08);
          --editor-active: rgba(255, 255, 255, 0.06);
          --editor-selection: rgba(110, 169, 255, 0.34);
          --editor-cursor: #ffd28f;
          --panel-ink: #eef4fb;
          --muted: #9aa7b8;
          --border: rgba(215, 226, 240, 0.16);
          --accent: #ff9f7a;
          --accent-strong: #ffb57e;
          --ok: #7fd6c2;
          --warn: #f0bd64;
          --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
          --syntax-keyword: #ffb57e;
          --syntax-module: #8ed2ff;
          --syntax-string: #b6f09c;
          --syntax-comment: #78879c;
          --syntax-number: #f7cd74;
          --syntax-operator: #f0f5ff;
          --syntax-function: #9fd8ff;
          --syntax-parameter: #ffd7a1;
          --syntax-type: #88c6ff;
          --syntax-constructor: #f2c572;
          --syntax-property: #d7c1ff;
          --syntax-tag: #ff9f7a;
          --syntax-annotation: #ffd28f;
          --syntax-package: #7fd6c2;
          --syntax-package-open: #a8bcff;
          --syntax-label: #f4b5ff;
          --output-panel-bg: rgba(23, 32, 42, 0.9);
          --output-bg: #141c25;
          --output-stream: #dce6f2;
          --output-code: #d6e1ef;
          --output-detail: #a9b7c8;
          --output-prefix: #8e9caf;
          --output-empty-a: rgba(21, 29, 38, 0.88);
          --output-empty-b: rgba(18, 25, 34, 0.88);
          --output-empty-stripe: rgba(235, 243, 255, 0.035);
          --output-warning-bg: linear-gradient(180deg, rgba(240, 189, 100, 0.12), rgba(23, 32, 42, 0.92));
          --output-error-bg: linear-gradient(180deg, rgba(255, 127, 104, 0.12), rgba(23, 32, 42, 0.92));
          --output-success-bg: linear-gradient(180deg, rgba(127, 214, 194, 0.1), rgba(23, 32, 42, 0.92));
          --interface-bg: rgba(35, 70, 62, 0.46);
          --interface-ink: #d8f5ea;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--panel-ink);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      .topbar {
        display: block;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font: 600 clamp(2rem, 5vw, 3.2rem) / 0.95 "Baskerville", "Iowan Old Style", serif;
        letter-spacing: -0.04em;
      }

      .picker {
        position: relative;
      }

      select {
        appearance: none;
        border: 1px solid rgba(19, 31, 47, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--panel-ink);
        height: 36px;
        padding: 8px 40px 8px 14px;
        font: 500 0.92rem/1 "Avenir Next", "Segoe UI", sans-serif;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .picker::after {
        content: "▾";
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
      }

      .reset-button {
        position: absolute;
        right: 14px;
        top: 14px;
        z-index: 5;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 9px;
        background: rgba(18, 22, 29, 0.78);
        color: #d8e3f2;
        cursor: pointer;
        font: 650 0.82rem/1 "Avenir Next", "Segoe UI", sans-serif;
        padding: 0 12px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
      }

      .reset-button:hover,
      .reset-button:focus-visible {
        border-color: rgba(255, 181, 126, 0.48);
        background: rgba(28, 35, 47, 0.94);
        color: #ffcfb4;
        outline: none;
      }

      .reset-button[hidden] {
        display: none;
      }

      .status {
        position: relative;
        min-width: 78px;
        padding-right: 18px;
        color: var(--muted);
        font: 500 0.9rem/1 "Avenir Next", "Segoe UI", sans-serif;
        text-align: right;
      }

      .status-dot {
        position: absolute;
        right: 0;
        top: 50%;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(24, 33, 44, 0.12);
        transform: translateY(-50%);
        transition: background 140ms ease, transform 140ms ease;
      }

      .status[data-state="loading"] .status-dot {
        background: #d79947;
      }

      .status[data-state="running"] .status-dot {
        background: var(--accent);
        transform: translateY(-50%) scale(1.2);
      }

      .status[data-state="warning"] .status-dot {
        background: #d79947;
      }

      .status[data-state="ready"] .status-dot {
        background: var(--ok);
      }

      .status[data-state="error"] .status-dot {
        background: var(--warn);
      }

      .status-text:empty {
        display: none;
      }

      .status-text {
        display: inline-block;
        min-width: 2.4em;
      }

      .header-tools {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }


      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(360px, 1fr);
        gap: 18px;
      }

      .surface {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--output-panel-bg);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .surface-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 56px;
        padding: 10px 18px;
        background: var(--output-panel-bg);
        border-bottom: 1px solid rgba(19, 31, 47, 0.08);
      }

      .editor-head {
        padding-right: 10px;
      }

      .output-head {
        padding-right: 20px;
      }

      .surface-label {
        font: 600 0.78rem/1 "Avenir Next", "Segoe UI", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .surface-meta {
        color: var(--muted);
        font: 500 0.9rem/1 "Avenir Next", "Segoe UI", sans-serif;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .editor-frame {
        position: relative;
        min-height: 68vh;
        background: var(--editor);
      }

      .editor-host {
        height: 100%;
      }

      .editor-frame .cm-editor {
        height: 100%;
        background: transparent;
        color: var(--editor-ink);
      }

      .editor-frame .cm-scroller {
        overflow: auto;
        font: 15px/1.65 "Berkeley Mono", "SFMono-Regular", "IBM Plex Mono", monospace;
      }

      .editor-frame .cm-gutters {
        background: var(--editor-gutter);
        border-right: 1px solid var(--editor-gutter-border);
        color: var(--editor-gutter-ink);
      }

      .editor-frame .cm-gutterElement {
        padding: 0 10px 0 14px;
      }

      .editor-frame .cm-content {
        padding: 22px 104px 28px 18px;
        min-height: 100%;
        caret-color: var(--editor-cursor);
      }

      .editor-frame .cm-line {
        padding: 0;
      }

      .editor-frame .cm-activeLine,
      .editor-frame .cm-activeLineGutter {
        background: var(--editor-active);
      }

      .editor-frame .cm-selectionBackground {
        background: var(--editor-selection) !important;
      }

      .editor-frame .cm-cursor,
      .editor-frame .cm-dropCursor {
        border-left-color: var(--editor-cursor);
      }

      .tok-keyword { color: var(--syntax-keyword); }
      .tok-module { color: var(--syntax-module); }
      .tok-string { color: var(--syntax-string); }
      .tok-comment { color: var(--syntax-comment); }
      .tok-number { color: var(--syntax-number); }
      .tok-operator { color: var(--syntax-operator); }
      .tok-function { color: var(--syntax-function); }
      .tok-parameter { color: var(--syntax-parameter); }
      .tok-type { color: var(--syntax-type); }
      .tok-constructor { color: var(--syntax-constructor); }
      .tok-property { color: var(--syntax-property); }
      .tok-tag { color: var(--syntax-tag); }
      .tok-oxcaml { color: var(--syntax-tag); font-weight: 700; }
      .tok-annotation { color: var(--syntax-annotation); font-style: italic; }
      .tok-package { color: var(--syntax-package); font-weight: 700; }
      .tok-package-open { color: var(--syntax-package-open); }
      .tok-label { color: var(--syntax-label); }

      .diag-error {
        text-decoration-line: underline;
        text-decoration-style: wavy;
        text-decoration-color: #ff7b5f;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 0.18em;
      }

      .diag-warning {
        text-decoration-line: underline;
        text-decoration-style: wavy;
        text-decoration-color: #e6b14a;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 0.18em;
      }

      .cm-diagnostic-error {
        text-decoration-line: underline;
        text-decoration-style: wavy;
        text-decoration-color: #ff7b5f;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 0.18em;
      }

      .cm-diagnostic-warning {
        text-decoration-line: underline;
        text-decoration-style: wavy;
        text-decoration-color: #e6b14a;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 0.18em;
      }

      .cm-tooltip.cm-tooltip-hover,
      .cm-diagnostic-tooltip {
        max-width: min(560px, calc(100vw - 48px));
        border: 1px solid rgba(19, 31, 47, 0.14);
        border-radius: 14px;
        background: rgba(255, 252, 247, 0.98);
        box-shadow: 0 18px 40px rgba(19, 31, 47, 0.16);
        color: var(--panel-ink);
        white-space: pre-wrap;
        padding: 10px 12px;
        font: 13px/1.45 "Berkeley Mono", "SFMono-Regular", "IBM Plex Mono", monospace;
      }

      .cm-diagnostic-tooltip.warning {
        border-color: rgba(215, 153, 71, 0.42);
      }

      .cm-diagnostic-tooltip.error {
        border-color: rgba(193, 78, 42, 0.38);
      }

      .output-panel {
        display: flex;
        flex-direction: column;
        min-height: 68vh;
      }

      .output-panel[data-state="warning"] {
        background: var(--output-warning-bg);
      }

      .output-panel[data-state="error"] {
        background: var(--output-error-bg);
      }

      .output-panel[data-state="output"] {
        background: var(--output-success-bg);
      }

      .output-body {
        flex: 1;
        min-height: 0;
        padding: 18px;
        overflow: auto;
        font: 14px/1.6 "Berkeley Mono", "SFMono-Regular", "IBM Plex Mono", monospace;
        transition: opacity 140ms ease;
      }

      .output-panel[data-busy="true"] .output-body {
        opacity: 0.62;
      }

      .output-empty {
        height: 100%;
        min-height: 180px;
        border-radius: 18px;
        background:
          linear-gradient(180deg, var(--output-empty-a), var(--output-empty-b)),
          repeating-linear-gradient(
            -45deg,
            var(--output-empty-stripe) 0,
            var(--output-empty-stripe) 12px,
            transparent 12px,
            transparent 24px
          );
      }

      .transcript {
        margin: 0;
        white-space: pre;
        overflow-wrap: normal;
      }

      .transcript-line {
        display: block;
      }

      .transcript-line.clickable {
        cursor: pointer;
      }

      .transcript-line.clickable:hover,
      .transcript-line.clickable:focus-visible {
        background: rgba(24, 33, 44, 0.06);
        outline: none;
      }

      .transcript-line.stream {
        color: var(--output-stream);
      }

      .transcript-line.placeholder {
        color: var(--muted);
      }

      .transcript-line.file {
        color: #7a4d35;
      }

      .transcript-line.warning {
        color: #9b5b1e;
        font-weight: 600;
      }

      .transcript-line.error,
      .transcript-line.exception {
        color: #8f3114;
        font-weight: 600;
      }

      .transcript-line.hint {
        color: #6d5d3f;
      }

      .transcript-line.caret {
        color: #c24e2a;
      }

      .transcript-line.code {
        color: var(--output-code);
      }

      .diagnostic-code-prefix {
        color: var(--output-prefix);
      }

      .transcript-line.detail,
      .transcript-line.trace {
        color: var(--output-detail);
      }

      .utop-outcome__keyword {
        color: #98521a;
        font-weight: 750;
      }

      .utop-outcome__name {
        color: #0b638a;
        font-weight: 700;
      }

      .utop-outcome__punctuation,
      .utop-outcome__equals {
        color: #7a8695;
      }

      .utop-outcome__type {
        color: #0f6f57;
      }

      .utop-outcome__value {
        color: var(--output-code);
      }

      .utop-stdout {
        color: var(--output-detail);
      }

      .html-output {
        margin: 14px 0;
        border: 1px solid rgba(71, 91, 112, 0.2);
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }

      .html-output__frame {
        display: block;
        width: 100%;
        height: 320px;
        border: 0;
        background: #ffffff;
      }

      .interface-output {
        margin-top: 18px;
        border: 1px solid rgba(15, 123, 95, 0.2);
        border-left: 4px solid #0f7b5f;
        border-radius: 8px;
        background: var(--interface-bg);
        padding: 12px 14px 13px;
      }

      .interface-output__label {
        margin-bottom: 8px;
        color: #0f6f57;
        font: 700 0.72rem/1 "Avenir Next", "Segoe UI", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .interface-output__body {
        margin: 0;
        color: var(--interface-ink);
        white-space: pre-wrap;
      }

      .output-body .tok-keyword { color: var(--syntax-keyword); font-weight: 650; }
      .output-body .tok-module { color: var(--syntax-module); }
      .output-body .tok-string { color: var(--syntax-string); }
      .output-body .tok-comment { color: var(--syntax-comment); }
      .output-body .tok-number { color: var(--syntax-number); }
      .output-body .tok-operator { color: var(--syntax-operator); }
      .output-body .tok-function { color: var(--syntax-function); }
      .output-body .tok-parameter { color: var(--syntax-parameter); }
      .output-body .tok-type { color: var(--syntax-type); }
      .output-body .tok-constructor { color: var(--syntax-constructor); }
      .output-body .tok-oxcaml { color: var(--syntax-tag); font-weight: 700; }
      .output-body .tok-annotation { color: var(--syntax-annotation); font-style: italic; }
      .output-body .tok-package { color: var(--syntax-package); font-weight: 700; }
      .output-body .tok-package-open { color: var(--syntax-package-open); }
      .output-body .tok-label { color: var(--syntax-label); }

      @media (max-width: 1180px) {
        main {
          width: min(100vw - 24px, 1180px);
          padding-top: 18px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .editor-frame,
        .output-panel {
          min-height: 46vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>OxCaml Playground</h1>
      </div>
      <div class="layout">
        <section class="surface">
          <div class="surface-head editor-head">
            <div class="surface-label">Editor</div>
              <div class="header-tools">
                <div class="picker">
                  <select id="sample-picker" aria-label="Sample">
                    <option value="">Sample</option>
                </select>
              </div>
            </div>
          </div>
          <div class="editor-frame">
            <button
              id="reset-source"
              class="reset-button"
              type="button"
              hidden>Reset</button>
            <div id="editor" class="editor-host" aria-label="Source code"></div>
          </div>
        </section>
        <section id="output-panel" class="surface output-panel" data-state="idle">
          <div class="surface-head output-head">
            <div id="output-label" class="surface-label">Output</div>
            <div id="status" class="status" data-state="loading" aria-live="polite">
              <span class="status-dot"></span>
              <span class="status-text">loading</span>
            </div>
          </div>
          <div id="output" class="output-body"></div>
        </section>
      </div>
    </main>
    <script type="importmap">
      {
        "imports": {
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.38.6?external=@codemirror/state",
          "@codemirror/language": "https://esm.sh/@codemirror/language@6.11.3?external=@codemirror/state,@codemirror/view,@lezer/highlight",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.1?external=@codemirror/state,@codemirror/view",
          "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.1"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
