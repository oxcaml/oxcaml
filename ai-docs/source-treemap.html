<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OxCaml Source Treemap</title>
    <style>
      :root {
        --bg: #f3f6ff;
        --panel: #fdfdff;
        --line: #cad3ff;
        --text: #0e1633;
        --muted: #5b6688;
        --accent: #3d6fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Atkinson Hyperlegible", "Segoe UI", "Inter", sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at 12% 10%, #ffffff 0%, #eef2ff 45%, #dde7ff 100%);
      }

      header {
        padding: 1rem 1.2rem;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 0.75rem;
        align-items: center;
      }

      .control {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.92rem;
      }

      label {
        color: var(--muted);
      }

      select,
      input[type="range"] {
        accent-color: var(--accent);
      }

      input[type="text"] {
        border: 1px solid #b8c5f2;
        border-radius: 4px;
        padding: 0.2rem 0.35rem;
        min-width: 7.8rem;
        font-size: 0.88rem;
      }

      #fileFilter {
        min-width: 20rem;
      }

      button {
        border: 1px solid #9eb0ea;
        background: #f6f9ff;
        color: #18306f;
        border-radius: 4px;
        padding: 0.23rem 0.5rem;
        font-size: 0.86rem;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.65;
      }

      .breadcrumbs {
        margin-top: 0.4rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .diff-info {
        color: #3d4f89;
        font-size: 0.88rem;
      }

      .subtle-info {
        color: #4f5f93;
        font-size: 0.84rem;
      }

      .subtle-info.error {
        color: #9a2a41;
      }

      .compare-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.6rem;
        margin-top: 0.55rem;
      }

      .compare-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }

      .hidden {
        display: none !important;
      }

      .mode-toggle {
        display: inline-flex;
        border: 1px solid #9eb0ea;
        border-radius: 6px;
        overflow: hidden;
      }

      .mode-btn {
        border: 0;
        border-right: 1px solid #9eb0ea;
        background: #eef3ff;
        border-radius: 0;
        padding: 0.25rem 0.55rem;
      }

      .mode-btn:last-child {
        border-right: 0;
      }

      .mode-btn.active {
        background: #335fda;
        color: #f4f7ff;
      }

      .preset-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.45rem;
      }

      .preset-btn {
        font-size: 0.8rem;
        padding: 0.2rem 0.45rem;
      }

      .ref-picker {
        position: fixed;
        min-width: 320px;
        max-width: 520px;
        max-height: min(54vh, 420px);
        overflow: auto;
        z-index: 30;
        border: 1px solid #95aae9;
        border-radius: 8px;
        background: #fdfdff;
        box-shadow: 0 10px 26px rgba(12, 24, 56, 0.25);
        padding: 0.4rem;
      }

      .picker-section {
        margin-bottom: 0.4rem;
      }

      .picker-section:last-child {
        margin-bottom: 0;
      }

      .picker-title {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #4960a7;
        padding: 0.1rem 0.25rem 0.2rem;
      }

      .picker-item {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.22rem 0.32rem;
        border-radius: 4px;
        border: 0;
        background: transparent;
        color: #1d2d5f;
        font-size: 0.84rem;
      }

      .picker-item:hover,
      .picker-item.active {
        background: #e7eeff;
      }

      .picker-empty {
        color: #6a769a;
        padding: 0.26rem 0.3rem;
        font-size: 0.82rem;
      }

      .breadcrumb-link {
        color: #2647a8;
        cursor: pointer;
      }

      .breadcrumb-link:hover {
        text-decoration: underline;
      }

      main {
        display: flex;
        flex: 1;
        min-height: 0;
        position: relative;
      }

      #chart-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
        margin: 0.75rem;
        border: 1px solid #b9c4ef;
        border-radius: 10px;
        overflow: hidden;
        background: #f9fbff;
      }

      #treemap {
        width: 100%;
        height: 100%;
        display: block;
      }

      .cell {
        stroke: rgba(15, 23, 51, 0.28);
        stroke-width: 1px;
      }

      .cell.dir {
        fill-opacity: 0.72;
      }

      .cell.file {
        fill-opacity: 0.86;
      }

      .label {
        fill: #f8fbff;
        font-size: 12px;
        paint-order: stroke;
        stroke: rgba(4, 12, 29, 0.38);
        stroke-width: 0.35;
        pointer-events: none;
        dominant-baseline: hanging;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
      }

      .tooltip {
        position: fixed;
        pointer-events: none;
        background: #111a34;
        color: #ecf0ff;
        border-radius: 6px;
        padding: 0.65rem 0.8rem;
        font-size: 12px;
        line-height: 1.45;
        max-width: 380px;
        max-height: 45vh;
        overflow-y: auto;
        overflow-wrap: break-word;
        white-space: pre-wrap;
        display: none;
        z-index: 10;
        box-shadow: 0 6px 20px rgba(9, 15, 37, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(2px);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      .tooltip p {
        margin: 0;
        margin-bottom: 0.35rem;
      }

      .tooltip p:last-child {
        margin-bottom: 0;
      }

      @media (max-width: 900px) {
        .toolbar {
          gap: 0.55rem;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
    <body>
      <header>
      <h1 id="title">OxCaml Source Treemap</h1>
      <div class="toolbar">
        <div class="control">
          <label for="fileFilter">File filter</label>
          <input
            id="fileFilter"
            type="text"
            placeholder="Fuzzy path/file filter (e.g. typsm)"
            autocomplete="off"
          />
        </div>
      </div>
      <div class="compare-row">
        <div class="compare-controls">
          <label for="fromRef">Commit</label>
          <input id="fromRef" type="text" placeholder="5.4.0" autocomplete="off" />
          <label for="toRef">Compare Against</label>
          <input id="toRef" type="text" placeholder="optional (e.g. 5.3.0)" autocomplete="off" />
          <label id="changedOnlyWrap" class="hidden" for="changedOnly">
            <input id="changedOnly" type="checkbox" />
            Changes only
          </label>
        </div>
      </div>
      <div class="compare-row">
        <div id="refMessage" class="subtle-info"></div>
      </div>
      <div id="refPicker" class="ref-picker hidden">
        <div id="refPickerSections"></div>
      </div>
      <div id="breadcrumbs" class="breadcrumbs" aria-label="Navigation path"></div>
    </header>
    <main>
      <div id="chart-wrap">
        <svg id="treemap" role="img" aria-label="Treemap of oxcaml source file sizes"></svg>
        <div id="tooltip" class="tooltip"></div>
      </div>
    </main>

    <script>
      const state = {
        fileFilter: "",
        changedOnly: false,
        vizMode: "type",
        rawRows: [],
        diffMeta: null,
        lastLoadMeta: null,
        apiAvailable: false,
        apiRefs: [],
        apiRefsPayload: null,
        refCatalog: {
          releases: [],
          tags: [],
          branches: [],
          recent: [],
        },
        picker: {
          inputId: "",
          activeIndex: -1,
          items: [],
          filterActive: false,
        },
        drillRootPath: "",
        treeCache: null,
        treeCacheKey: "",
        visibleFileCount: 0,
        summaryByKey: new Map(),
        hoverSummaryTimerId: 0,
        hoverSummaryKey: "",
        currentTooltipNode: null,
      };

      const controls = {
        title: document.getElementById("title"),
        fileFilter: document.getElementById("fileFilter"),
        changedOnly: document.getElementById("changedOnly"),
        changedOnlyWrap: document.getElementById("changedOnlyWrap"),
        fromRef: document.getElementById("fromRef"),
        toRef: document.getElementById("toRef"),
        refMessage: document.getElementById("refMessage"),
        refPicker: document.getElementById("refPicker"),
        refPickerSections: document.getElementById("refPickerSections"),
        breadcrumbs: document.getElementById("breadcrumbs"),
        tooltip: document.getElementById("tooltip"),
      };

      const svg = document.getElementById("treemap");
      const wrap = document.getElementById("chart-wrap");
      const queryParams = new URLSearchParams(window.location.search);
      const githubRepo = queryParams.get("githubRepo") || "https://github.com/oxcaml/oxcaml";
      const githubRepoBase = githubRepo.replace(/\/+$/, "");
      const githubBranch = queryParams.get("githubBranch") || queryParams.get("branch") || "main";
      const viewerPage = queryParams.get("viewerPage") || "source-viewer.html";
      const phi = (1 + Math.sqrt(5)) / 2;
      const padding = 1.8;
      const autoMainBaseValue = "__AUTO_MAIN_BASE__";
      const rerenderQueued = debounce(() => {
        renderTreemap();
      }, 70);

      const pickerInputIds = ["fromRef", "toRef"];
      for (const id of pickerInputIds) {
        const input = controls[id];
        input.addEventListener("focus", () => {
          state.picker.filterActive = false;
          openRefPicker(id);
        });
        input.addEventListener("input", () => {
          state.picker.filterActive = true;
          openRefPicker(id);
        });
        input.addEventListener("keydown", (event) => {
          const pickerOpen = !controls.refPicker.classList.contains("hidden");
          const handled = handlePickerKeydown(event);
          if (handled) return;
          const pickerHasItems = state.picker.items.length > 0;
          if (event.key === "Enter" && (!pickerOpen || !pickerHasItems)) {
            event.preventDefault();
            loadSelectedDiffFromApi();
          }
        });
      }

      document.addEventListener("mousedown", (event) => {
        if (!controls.refPicker || controls.refPicker.classList.contains("hidden")) return;
        const target = event.target;
        if (!(target instanceof Node)) return;
        const currentInput = controls[state.picker.inputId];
        if (controls.refPicker.contains(target)) return;
        if (currentInput && currentInput.contains && currentInput.contains(target)) return;
        closeRefPicker();
      });

      controls.fileFilter.addEventListener("input", () => {
        state.fileFilter = controls.fileFilter.value || "";
        rerenderQueued();
      });

      controls.changedOnly.addEventListener("change", () => {
        state.changedOnly = !!controls.changedOnly.checked;
        rerenderQueued();
      });

      window.addEventListener("resize", debounce(() => {
        closeRefPicker();
        renderTreemap();
      }, 120));

      (async function init() {
        const cacheToken = `v=${Date.now()}`;
        disableLoadControls(true);
        let treemapPayload = null;

        const refsPayload = await fetchJsonMaybe(`/api/refs?${cacheToken}`);
        if (refsPayload && Array.isArray(refsPayload.refs)) {
          state.apiAvailable = true;
          state.apiRefs = refsPayload.refs.slice();
          state.apiRefsPayload = refsPayload;
          state.refCatalog = buildRefCatalog(refsPayload);
          applyInitialSelection(refsPayload);
          const selection = buildDiffSelection();
          if (selection) {
            treemapPayload = await fetchPayloadForSelection(selection, cacheToken);
            state.vizMode = selection.secondary ? "changeBands" : "type";
          }
          disableLoadControls(false);
        } else {
          disableLoadControls(true);
        }

        if (!treemapPayload) {
          treemapPayload = await fetchJsonStrict(`source-treemap-data.json?${cacheToken}`);
        }

        state.diffMeta = extractTreemapMeta(treemapPayload);
        state.lastLoadMeta = state.diffMeta;
        state.rawRows = parseTreemapRows(treemapPayload);
        renderTreemap();
        updateLoadStatus();
      })();

      function buildTree() {
        const root = {
          name: "source",
          path: "",
          value: 0,
          addedLines: 0,
          deletedLines: 0,
          hasDiff: false,
          children: [],
          childIndex: new Map(),
          isDir: true,
          depth: 0,
        };

        iterateDataRows((row) => {
          const rowPath = row.path;
          const rowBytes = row.bytes;
          const rowExt = row.extension;
          if (!isTrackableSourcePath(rowPath)) return;
          if (!matchesFileFilter(rowPath, state.fileFilter)) return;
          const addedLines = Math.max(0, Number(row.addedLines) || 0);
          const deletedLines = Math.max(0, Number(row.deletedLines) || 0);
          const oldLinesBefore = Math.max(0, Number(row.oldLinesBefore) || 0);
          const hasDiff = !!row.hasDiff;
          const changeStatus = String(row.changeStatus || "unchanged");
          if (state.changedOnly && isComparisonMode() && !rowHasDiffChange(row)) return;
          const useDiffSizedLayout = state.changedOnly && isComparisonMode();
          const bytes = useDiffSizedLayout
            ? addedLines + deletedLines
            : Number(rowBytes);
          if (!Number.isFinite(bytes) || bytes <= 0) return;
          const bytesBefore = Math.max(0, Number(row.bytesBefore) || 0);
          const bytesAfter = Math.max(0, Number(row.bytesAfter) || 0);

          const parts = String(rowPath).split("/");
          const file = parts.pop();
          let current = root;
          let prefix = "";

          for (let i = 0; i < parts.length; i++) {
            const dir = parts[i];
            prefix = prefix ? `${prefix}/${dir}` : dir;
            let child = current.childIndex.get(dir);
            if (!child) {
              child = {
                name: dir,
                path: prefix,
                value: 0,
                addedLines: 0,
                deletedLines: 0,
                hasDiff: false,
                children: [],
                childIndex: new Map(),
                isDir: true,
                depth: current.depth + 1,
                parent: current,
              };
              current.children.push(child);
              current.childIndex.set(dir, child);
            }
            child.value += bytes;
            child.addedLines += addedLines;
            child.deletedLines += deletedLines;
            child.hasDiff = child.hasDiff || hasDiff;
            current = child;
          }

          const fullPath = String(rowPath);
          current.children.push({
            name: file,
            path: fullPath,
            value: bytes,
            isDir: false,
            extension: rowExt,
            bytesBefore,
            bytesAfter,
            addedLines,
            deletedLines,
            oldLinesBefore,
            hasDiff,
            changeStatus,
            depth: current.depth + 1,
            parent: current,
          });
          current.value += bytes;
          current.addedLines += addedLines;
          current.deletedLines += deletedLines;
          current.hasDiff = current.hasDiff || hasDiff;
        });

        pruneAndSort(root);
        return root;
      }

      function normalizeRow(row) {
        if (!row || typeof row !== "object") {
          return null;
        }
        const path = String(row.path || "");
        if (!path) return null;
        const extension = String(row.extension || "").toLowerCase();
        return {
          path,
          bytes: Number(row.bytes),
          bytesBefore: Number(row.bytesBefore),
          bytesAfter: Number(row.bytesAfter),
          extension,
          hasDiff: !!row.hasDiff,
          changeStatus: String(row.changeStatus || "unchanged"),
          addedLines: Number(row.addedLines) || 0,
          deletedLines: Number(row.deletedLines) || 0,
          oldLinesBefore: Number(row.oldLinesBefore) || 0,
        };
      }

      function parseTreemapRows(rawRows) {
        if (!rawRows) return [];
        if (Array.isArray(rawRows)) {
          return rawRows.map(normalizeRow).filter(Boolean);
        }
        if (rawRows && Array.isArray(rawRows.rows)) {
          return rawRows.rows.map(normalizeRow).filter(Boolean);
        }
        if (rawRows && rawRows.kind === "packed") return rawRows;

        const text = String(rawRows);
        if (text[0] === "[" && text.includes('{"path"')) {
          try {
            const parsed = JSON.parse(text);
            return parsed.map(normalizeRow).filter(Boolean);
          } catch {
            return [];
          }
        }

        const lines = text.split("\n");
        const paths = [];
        const bytes = [];
        const extensions = [];
        for (const line of lines) {
          if (!line) continue;
          const a = line.indexOf("\t");
          if (a < 0) continue;
          const b = line.lastIndexOf("\t");
          if (b <= a) continue;

          paths.push(line.slice(0, a));
          bytes.push(Number(line.slice(a + 1, b)));
          extensions.push(line.slice(b + 1));
        }
        return {
          kind: "packed",
          paths,
          bytes,
          extensions,
        };
      }

      function extractTreemapMeta(rawRows) {
        if (!rawRows || typeof rawRows !== "object") return null;
        if (rawRows.meta && typeof rawRows.meta === "object") return rawRows.meta;
        const rows = Array.isArray(rawRows.rows) ? rawRows.rows : Array.isArray(rawRows) ? rawRows : [];
        const hasAnyDiff = rows.some((row) => row && row.hasDiff);
        if (!hasAnyDiff) return null;
        return {
          diff: {
            from: "unknown",
            to: "unknown",
            sizeBasis: "max",
          },
        };
      }

      async function fetchJsonStrict(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Failed request (${response.status}): ${url}`);
        }
        return response.json();
      }

      async function fetchJsonMaybe(url) {
        try {
          return await fetchJsonStrict(url);
        } catch {
          return null;
        }
      }

      function setRefMessage(text, isError) {
        if (!controls.refMessage) return;
        controls.refMessage.textContent = String(text || "");
        controls.refMessage.classList.toggle("error", !!isError);
      }

      function disableLoadControls(disabled) {
        controls.fromRef.disabled = disabled;
        controls.toRef.disabled = disabled;
      }

      function isReleaseTag(refName) {
        return /^\d+\.\d+\.\d+$/.test(String(refName || ""));
      }

      function buildRefCatalog(payload) {
        const tags = Array.isArray(payload.tags) ? payload.tags : [];
        const branches = Array.isArray(payload.branches) ? payload.branches : [];
        const recent = Array.isArray(payload.recentCommits) ? payload.recentCommits : [];
        const releases = tags.filter(isReleaseTag).slice(0, 40);
        const otherTags = tags.filter((tag) => !isReleaseTag(tag)).slice(0, 200);
        return {
          releases,
          tags: otherTags,
          branches: branches.slice(0, 120),
          recent: recent.slice(0, 120),
        };
      }

      function applyInitialSelection(refsPayload) {
        const defaultTo = "origin/main";
        const defaultFrom = refsPayload.defaultFrom || "5.3.0";
        const primary = queryParams.get("primary") || queryParams.get("to") || defaultTo;
        const secondary = queryParams.get("secondary") || queryParams.get("from") || "";
        controls.fromRef.value = primary;
        controls.toRef.value = secondary;
      }

      function buildDiffSelection() {
        const primary = String(controls.fromRef.value || "").trim();
        const secondary = String(controls.toRef.value || "").trim();
        if (!primary) return null;
        return {
          primary,
          secondary,
        };
      }

      function updateQueryForSelection(selection) {
        const params = new URLSearchParams(window.location.search);
        params.set("primary", selection.primary);
        if (selection.secondary) params.set("secondary", selection.secondary);
        else params.delete("secondary");
        params.delete("mode");
        params.delete("from");
        params.delete("to");
        params.delete("commit");
        params.delete("baseline");
        params.delete("parent");
        params.delete("singleFrom");
        const next = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState(null, "", next);
      }

      async function fetchPayloadForSelection(selection, cacheToken) {
        const token = cacheToken || `v=${Date.now()}`;
        if (!selection.secondary) {
          return fetchJsonMaybe(
            `/api/tree?ref=${encodeURIComponent(selection.primary)}&${token}`
          );
        }
        return fetchJsonMaybe(
          `/api/diff?from=${encodeURIComponent(selection.secondary)}&to=${encodeURIComponent(selection.primary)}&sizeBasis=max&${token}`
        );
      }

      async function loadSelectedDiffFromApi() {
        if (!state.apiAvailable) return;
        const selection = buildDiffSelection();
        if (!selection) return;
        closeRefPicker();
        try {
          const payload = await fetchPayloadForSelection(selection);
          if (!payload) {
            setRefMessage(`Load failed: ${selection.primary}${selection.secondary ? ` vs ${selection.secondary}` : ""}`, true);
            return;
          }
          setRefMessage("", false);
          state.diffMeta = extractTreemapMeta(payload);
          state.lastLoadMeta = state.diffMeta;
          state.rawRows = parseTreemapRows(payload);
          state.treeCache = null;
          state.treeCacheKey = "";
          state.vizMode = selection.secondary ? "changeBands" : "type";
          updateQueryForSelection(selection);
          renderTreemap();
          updateLoadStatus();
        } catch (error) {
          setRefMessage(
            `Load failed: ${selection.primary}${selection.secondary ? ` vs ${selection.secondary}` : ""}`,
            true
          );
          console.error(error);
        }
      }

      function buildPickerSections(inputId, queryText) {
        const q = String(queryText || "").trim().toLowerCase();
        const sections = [];
        const catalog = state.refCatalog;
        const byQuery = (value) => !q || value.toLowerCase().includes(q);
        if (inputId === "toRef") {
          const primary = String(controls.fromRef.value || "").trim();
          if (primary) {
            sections.push({
              title: "Suggested",
              items: [{
                value: autoMainBaseValue,
                label: "Auto: branch point",
                kind: "autoMainBase",
              }],
            });
          }
        }

        const releases = (catalog.releases || []).filter(byQuery).slice(0, 50).map((value) => {
          return { value, label: value };
        });
        const tags = (catalog.tags || []).filter(byQuery).slice(0, 80).map((value) => {
          return { value, label: value };
        });
        const branches = (catalog.branches || []).filter(byQuery).slice(0, 80).map((value) => {
          return { value, label: value };
        });
        const recent = (catalog.recent || []).filter((item) => {
          const value = String(item && item.ref ? item.ref : "");
          const subject = String(item && item.subject ? item.subject : "");
          if (!q) return true;
          return value.toLowerCase().includes(q) || subject.toLowerCase().includes(q);
        }).slice(0, 70).map((item) => {
          const sha = String(item.ref || "");
          const subject = String(item.subject || "");
          const short = sha.slice(0, 10);
          return {
            value: sha,
            label: subject ? `${short} ${subject}` : short,
          };
        });

        if (releases.length) sections.push({ title: "Releases", items: releases });
        if (branches.length) sections.push({ title: "Branches", items: branches });
        if (tags.length) sections.push({ title: "Tags", items: tags });
        if (recent.length) sections.push({ title: "Recent", items: recent });
        return sections;
      }

      function openRefPicker(inputId) {
        if (!state.apiAvailable) return;
        const input = controls[inputId];
        if (!input || input.disabled) return;
        state.picker.inputId = inputId;
        const queryText = state.picker.filterActive ? input.value : "";
        const sections = buildPickerSections(inputId, queryText);
        state.picker.items = [];
        state.picker.activeIndex = -1;
        controls.refPickerSections.innerHTML = "";
        for (const section of sections) {
          const sectionEl = document.createElement("div");
          sectionEl.className = "picker-section";
          const titleEl = document.createElement("div");
          titleEl.className = "picker-title";
          titleEl.textContent = section.title;
          sectionEl.appendChild(titleEl);
          for (const item of section.items) {
            const index = state.picker.items.length;
            state.picker.items.push(item);
            const button = document.createElement("button");
            button.type = "button";
            button.className = "picker-item";
            button.textContent = item.label;
            button.dataset.pickerIndex = String(index);
            button.addEventListener("mousedown", (event) => {
              event.preventDefault();
            });
            button.addEventListener("click", () => {
              applyPickerItem(index);
            });
            sectionEl.appendChild(button);
          }
          controls.refPickerSections.appendChild(sectionEl);
        }
        if (state.picker.items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "picker-empty";
          empty.textContent = "No matching refs";
          controls.refPickerSections.appendChild(empty);
        }
        const rect = input.getBoundingClientRect();
        controls.refPicker.style.left = `${Math.round(rect.left)}px`;
        controls.refPicker.style.top = `${Math.round(rect.bottom + 6)}px`;
        controls.refPicker.style.minWidth = `${Math.max(280, Math.round(rect.width + 80))}px`;
        controls.refPicker.classList.remove("hidden");
      }

      function closeRefPicker() {
        controls.refPicker.classList.add("hidden");
        state.picker.inputId = "";
        state.picker.activeIndex = -1;
        state.picker.items = [];
        state.picker.filterActive = false;
      }

      async function resolveAutoMainBase(primaryRef) {
        const ref = String(primaryRef || "").trim();
        if (!ref) return "";
        const token = `v=${Date.now()}`;
        const payload = await fetchJsonMaybe(
          `/api/merge-base?ref=${encodeURIComponent(ref)}&target=${encodeURIComponent("origin/main")}&${token}`
        );
        if (!payload || !payload.mergeBase) return "";
        return String(payload.mergeBase);
      }

      async function applyPickerItem(index) {
        if (!Number.isFinite(index) || index < 0 || index >= state.picker.items.length) return;
        const input = controls[state.picker.inputId];
        if (!input) return;
        const selected = state.picker.items[index];
        if (selected && selected.kind === "autoMainBase" && state.picker.inputId === "toRef") {
          const resolved = await resolveAutoMainBase(controls.fromRef.value);
          if (!resolved) {
            setRefMessage(
              "Auto branch-point lookup failed. Restart treemap-live-server to enable /api/merge-base.",
              true
            );
            closeRefPicker();
            return;
          }
          setRefMessage("", false);
          input.value = resolved;
        } else {
          setRefMessage("", false);
          input.value = selected.value;
        }
        closeRefPicker();
        loadSelectedDiffFromApi();
      }

      function handlePickerKeydown(event) {
        if (controls.refPicker.classList.contains("hidden")) return false;
        if (!state.picker.items.length) return false;
        if (event.key === "ArrowDown") {
          event.preventDefault();
          state.picker.activeIndex = (state.picker.activeIndex + 1) % state.picker.items.length;
          updatePickerActiveItem();
          return true;
        }
        if (event.key === "ArrowUp") {
          event.preventDefault();
          state.picker.activeIndex = (state.picker.activeIndex - 1 + state.picker.items.length) % state.picker.items.length;
          updatePickerActiveItem();
          return true;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          const idx = state.picker.activeIndex >= 0 ? state.picker.activeIndex : 0;
          applyPickerItem(idx);
          return true;
        }
        if (event.key === "Escape") {
          event.preventDefault();
          closeRefPicker();
          return true;
        }
        return false;
      }

      function updatePickerActiveItem() {
        const buttons = controls.refPickerSections.querySelectorAll(".picker-item");
        buttons.forEach((button) => {
          const idx = Number(button.getAttribute("data-picker-index"));
          button.classList.toggle("active", idx === state.picker.activeIndex);
          if (idx === state.picker.activeIndex) {
            button.scrollIntoView({ block: "nearest" });
          }
        });
      }

      function iterateDataRows(fn) {
        const rows = state.rawRows;
        if (!rows) return;

        if (rows.kind === "packed") {
          for (let i = 0; i < rows.paths.length; i++) {
            fn({
              path: rows.paths[i],
              bytes: rows.bytes[i],
              extension: rows.extensions[i],
              bytesBefore: rows.bytes[i],
              bytesAfter: rows.bytes[i],
              hasDiff: false,
              changeStatus: "present",
              addedLines: 0,
              deletedLines: 0,
              oldLinesBefore: 0,
            });
          }
          return;
        }

        if (Array.isArray(rows)) {
          for (const row of rows) {
            fn(row);
          }
        }
      }

      function hasRows(rows) {
        if (!rows) return false;
        if (rows.kind === "packed") return Array.isArray(rows.paths) && rows.paths.length > 0;
        return Array.isArray(rows) ? rows.length > 0 : false;
      }

      function pruneAndSort(node) {
        if (!node.children || !node.children.length) return node;
        const kept = [];
        for (const child of node.children) {
          pruneAndSort(child);
          if ((child.children && child.children.length) || child.value > 0) {
            kept.push(child);
          }
        }
        node.children = kept.sort((a, b) => b.value - a.value);
        node.value = node.children.reduce((sum, child) => sum + child.value, 0);
      }

      function isTrackableSourcePath(pathValue) {
        const path = String(pathValue || "");
        if (!path) return false;
        return !path.startsWith("_install/") && !path.startsWith("/_install/");
      }

      function normalizeFilterQuery(value) {
        return String(value || "").trim().toLowerCase().replace(/\s+/g, "");
      }

      function fuzzySubsequenceMatch(textValue, queryValue) {
        const text = String(textValue || "");
        const query = String(queryValue || "");
        if (!query) return true;
        let q = 0;
        for (let i = 0; i < text.length && q < query.length; i++) {
          if (text[i] === query[q]) q += 1;
        }
        return q === query.length;
      }

      function matchesFileFilter(pathValue, queryValue) {
        const path = String(pathValue || "").toLowerCase();
        const query = normalizeFilterQuery(queryValue);
        if (!query) return true;
        const compactPath = path.replace(/\s+/g, "");
        if (fuzzySubsequenceMatch(compactPath, query)) return true;
        const basename = compactPath.slice(compactPath.lastIndexOf("/") + 1);
        return fuzzySubsequenceMatch(basename, query);
      }

      function isComparisonMode() {
        return state.vizMode === "changeBands";
      }

      function rowHasDiffChange(row) {
        if (!row) return false;
        const added = Math.max(0, Number(row.addedLines) || 0);
        const deleted = Math.max(0, Number(row.deletedLines) || 0);
        if (added + deleted > 0) return true;
        const status = String(row.changeStatus || "");
        return status === "added" || status === "deleted" || status === "modified";
      }

      function updateChangedOnlyVisibility() {
        const show = isComparisonMode();
        controls.changedOnlyWrap.classList.toggle("hidden", !show);
        controls.changedOnly.disabled = !show;
      }

      function renderTreemap() {
        const hasData = hasRows(state.rawRows);
        if (!hasData) {
          return;
        }
        updateChangedOnlyVisibility();
        const filterKey = [
          normalizeFilterQuery(state.fileFilter),
          state.changedOnly && isComparisonMode() ? "changed" : "all",
          state.vizMode,
        ].join("|");
        if (!state.treeCache || state.treeCacheKey !== filterKey) {
          state.treeCache = buildTree();
          state.treeCacheKey = filterKey;
        }
        const root = state.treeCache;
        const w = wrap.clientWidth;
        const h = wrap.clientHeight;
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
        svg.setAttribute("width", w);
        svg.setAttribute("height", h);
        const displayRoot = getDisplayRoot(root);
        const visibleFileCount = nodeCount(displayRoot);
        state.visibleFileCount = visibleFileCount;

        clearSvg();
        layoutNode(displayRoot, 0, 0, w, h, 0);
        controls.title.textContent = `OxCaml Source Treemap (${visibleFileCount} files)`;
        updateDiffInfo();
        updateLoadStatus();
        renderBreadcrumbs(state.drillRootPath);

        const nodes = [];
        const dirHeaderNodes = [];
        flattenNodes(displayRoot, nodes);
        const headerRects = [];

        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const maxDepth = Math.max(...nodes.map((n) => n.depth));
        let droppedNodes = 0;
        nodes.forEach((n, i) => {
          if (!hasFiniteRect(n)) {
            droppedNodes += 1;
            return;
          }
          if (!Number.isFinite(n.x0) || !Number.isFinite(n.y0) || !Number.isFinite(n.x1) || !Number.isFinite(n.y1)) {
            droppedNodes += 1;
            return;
          }
          const cell = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rect.setAttribute("x", String(n.x0));
          rect.setAttribute("y", String(n.y0));
          rect.setAttribute("width", String(Math.max(0, n.x1 - n.x0)));
          rect.setAttribute("height", String(Math.max(0, n.y1 - n.y0)));
          rect.setAttribute("class", `cell ${n.isDir ? "dir" : "file"}`);
          rect.setAttribute("fill", fillColorForNode(n, maxDepth));

          rect.addEventListener("mousemove", (event) => {
            showNodeTooltip(event, n);
          });
          if (!n.isDir) {
            cell.addEventListener("click", (event) => {
              event.stopPropagation();
              openSourceFile(n);
            });
            cell.style.cursor = "pointer";
          }
          rect.addEventListener("mouseleave", hideTooltip);

          cell.appendChild(rect);
          if (!n.isDir && state.vizMode === "changeBands") {
            renderChangeBands(cell, n);
          }

          const showFileLabel = shouldShowFileLabel(n);
          const showDirHeader = shouldShowDirHeader(n) && n.isDir;
          if (showFileLabel) {
            const width = n.x1 - n.x0;
            const height = n.y1 - n.y0;
            const fileFontSize = Math.max(7, Math.min(12, Math.floor(height * 0.65)));
            if (fileFontSize >= 10) {
              const textY = Math.max(
                n.y0 + 3,
                Math.min(n.y1 - fileFontSize - 2, n.y0 + height * 0.66)
              );
            const clipId = `clip-${i}`;
            const clip = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
            clip.setAttribute("id", clipId);
            const clipRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            clipRect.setAttribute("x", String(n.x0 + 3));
            clipRect.setAttribute("y", String(n.y0 + 3));
            clipRect.setAttribute("width", String(Math.max(0, width - 6)));
            clipRect.setAttribute("height", String(Math.max(0, height - 2)));
            clip.appendChild(clipRect);
            defs.appendChild(clip);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", String(n.x0 + 8));
            text.setAttribute("y", String(textY));
            text.setAttribute("class", "label");
            text.setAttribute("clip-path", `url(#${clipId})`);
            text.setAttribute("font-size", String(fileFontSize));
            text.textContent = shortLabel(n.name, width, height);
            text.style.fill = "#f6f8ff";
            text.style.fontWeight = "600";
            text.setAttribute("dominant-baseline", "hanging");
            cell.appendChild(text);
            }
          }

          if (showDirHeader) {
            dirHeaderNodes.push(n);
          }

          g.appendChild(cell);
        });

        for (let hi = 0; hi < dirHeaderNodes.length; hi++) {
          const node = dirHeaderNodes[hi];
          if (!hasFiniteRect(node)) continue;
          const width = node.x1 - node.x0;
          const height = node.y1 - node.y0;
          const headerHeight = Math.max(9, Math.min(13, (height - 4) * 0.6));
          const placement = placeDirHeader(node, headerHeight, headerRects);
          if (!placement) continue;
          const headerY = placement.y0;
          const headerDisplayY = Math.max(node.y0 + 1, headerY);
          const headerWidth = Math.max(0, width - 6);

          const headerCell = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const clipBoundsId = `dir-header-bounds-${hi}`;
          const clipBounds = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
          clipBounds.setAttribute("id", clipBoundsId);
          const clipBoundsRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          clipBoundsRect.setAttribute("x", String(node.x0));
          clipBoundsRect.setAttribute("y", String(node.y0));
          clipBoundsRect.setAttribute("width", String(Math.max(0, width)));
          clipBoundsRect.setAttribute("height", String(Math.max(0, height)));
          clipBounds.appendChild(clipBoundsRect);
          defs.appendChild(clipBounds);
          headerCell.setAttribute("clip-path", `url(#${clipBoundsId})`);

          const headerBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          headerBg.setAttribute("x", String(node.x0 + 3));
          headerBg.setAttribute("y", String(headerDisplayY));
          headerBg.setAttribute("width", String(headerWidth));
          headerBg.setAttribute("height", String(headerHeight));
          headerBg.setAttribute("fill", "rgba(8, 23, 74, 0.62)");
          headerBg.setAttribute("stroke", "rgba(226, 236, 255, 0.8)");
          headerBg.setAttribute("stroke-width", "1");
          headerBg.setAttribute("rx", "2");

          const clipDirId = `dir-header-${hi}`;
          const clip = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
          clip.setAttribute("id", clipDirId);
          const clipRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          clipRect.setAttribute("x", String(node.x0 + 3));
          clipRect.setAttribute("y", String(headerDisplayY));
          clipRect.setAttribute("width", String(Math.max(0, headerWidth - 2)));
          clipRect.setAttribute("height", String(Math.max(0, headerHeight - 1)));
          clip.appendChild(clipRect);
          defs.appendChild(clip);

          const headerTextFont = Math.max(6, Math.min(8, Math.floor(headerHeight * 0.55)));
          const headerText = document.createElementNS("http://www.w3.org/2000/svg", "text");
          headerText.setAttribute("x", String(node.x0 + 9));
          headerText.setAttribute("y", String(headerDisplayY + Math.max(1, Math.floor((headerHeight - headerTextFont) / 2))));
          headerText.setAttribute("class", "label");
          headerText.setAttribute("clip-path", `url(#${clipDirId})`);
          headerText.setAttribute("font-size", String(headerTextFont));
          headerText.style.fill = "#ffffff";
          headerText.style.fontWeight = "800";
          headerText.style.dominantBaseline = "hanging";
          headerText.textContent = shortLabel(node.name, width, height);

          headerCell.appendChild(headerBg);
          headerCell.appendChild(headerText);
          headerCell.addEventListener("mousemove", (event) => {
            showNodeTooltip(
              event,
              {
                ...node,
                nodeType: "Directory",
              }
            );
          });
          headerCell.addEventListener("click", (event) => {
            event.stopPropagation();
            navigateToPath(node.path);
          });
          headerCell.addEventListener("mouseleave", hideTooltip);
          g.appendChild(headerCell);

          headerRects.push({
            path: node.path,
            rect: {
              x0: node.x0 + 3,
              x1: node.x0 + 3 + headerWidth,
              y0: headerDisplayY,
              y1: headerDisplayY + headerHeight,
            },
          });
        }

        svg.appendChild(defs);
        svg.appendChild(g);
        if (droppedNodes > 0) {
          console.warn(`Treemap: skipped ${droppedNodes} nodes due to non-finite geometry`);
        }
      }

      function clearSvg() {
        while (svg.firstChild) {
          svg.removeChild(svg.firstChild);
        }
      }

      function getDisplayRoot(root) {
        if (!state.drillRootPath) return root;
        const parts = state.drillRootPath.split("/").filter(Boolean);
        let current = root;
        for (const part of parts) {
          const next = current.childIndex?.get(part);
          if (!next || !next.isDir) {
            state.drillRootPath = "";
            return root;
          }
          current = next;
        }
        return current;
      }

      function navigateToPath(path) {
        const nextPath = path || "";
        if (state.drillRootPath === nextPath) return;
        state.drillRootPath = nextPath;
        renderTreemap();
      }

      function renderBreadcrumbs(path) {
        const parts = path ? path.split("/").filter(Boolean) : [];
        let html = "";
        let acc = "";
        const crumbs = [{ path: "", label: "oxcaml" }];
        for (const part of parts) {
          acc = acc ? `${acc}/${part}` : part;
          crumbs.push({ path: acc, label: part });
        }
        html = crumbs
          .map((crumb) => `<span class="breadcrumb-link" data-breadcrumb-path="${crumb.path}">${crumb.label}</span>`)
          .join(" / ");
        controls.breadcrumbs.innerHTML = html;
        controls.breadcrumbs.querySelectorAll("[data-breadcrumb-path]").forEach((item) => {
          item.addEventListener("click", () => {
            navigateToPath(item.getAttribute("data-breadcrumb-path") || "");
          });
        });
      }

      function nodeHasDiffChange(node) {
        if (!node || node.isDir) return false;
        const added = Math.max(0, Number(node.addedLines) || 0);
        const deleted = Math.max(0, Number(node.deletedLines) || 0);
        if (added + deleted > 0) return true;
        const status = String(node.changeStatus || "");
        return status === "added" || status === "deleted" || status === "modified";
      }

      async function sha256Hex(text) {
        const bytes = new TextEncoder().encode(String(text || ""));
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        const hash = Array.from(new Uint8Array(digest), (value) => value.toString(16).padStart(2, "0")).join("");
        return hash;
      }

      function buildViewerUrl(params) {
        const q = new URLSearchParams(params);
        return `${viewerPage}?${q.toString()}`;
      }

      function openViewer(params) {
        window.location.href = buildViewerUrl(params);
      }

      async function openSourceFile(node) {
        if (!node || node.isDir) return;
        const filePath = String(node.path || "").trim();
        if (!filePath) return;
        const meta = state.diffMeta || {};
        const diff = meta.diff || null;
        const tree = meta.tree || null;
        const baseParams = {
          path: filePath,
          repo: githubRepoBase,
          branch: githubBranch,
        };

        if (diff && !tree) {
          const fromRef = String(diff.fromResolved || diff.from || "").trim();
          const toRef = String(diff.toResolved || diff.to || "").trim();
          if (fromRef && toRef) {
            openViewer({
              ...baseParams,
              mode: "diff",
              from: fromRef,
              to: toRef,
            });
            return;
          }
        }

        const treeRef = tree ? String(tree.resolved || tree.ref || "").trim() : "";
        const targetRef = treeRef || githubBranch;
        openViewer({
          ...baseParams,
          mode: "file",
          ref: targetRef,
        });
      }

      function summaryRequestForNode(node) {
        if (!node || node.isDir || !node.path) return null;
        const filePath = String(node.path || "").trim();
        if (!filePath) return null;
        const meta = state.diffMeta || {};
        const diff = meta.diff || null;
        const tree = meta.tree || null;
        if (diff && !tree) {
          const from = String(diff.fromResolved || diff.from || "").trim();
          const to = String(diff.toResolved || diff.to || "").trim();
          if (from && to) {
            return {
              mode: "diff",
              path: filePath,
              from,
              to,
            };
          }
        }
        const treeRef = tree ? String(tree.resolved || tree.ref || "").trim() : "";
        const ref = treeRef || String(controls.fromRef.value || "").trim() || githubBranch;
        return {
          mode: "file",
          path: filePath,
          ref,
        };
      }

      function summaryKeyForRequest(request) {
        if (!request) return "";
        if (request.mode === "diff") {
          return `diff|${request.from}|${request.to}|${request.path}`;
        }
        return `file|${request.ref}|${request.path}`;
      }

      async function fetchUnifiedSummary(request, trigger) {
        if (!request) return null;
        const params = new URLSearchParams();
        params.set("path", request.path);
        params.set("trigger", trigger ? "1" : "0");
        if (request.mode === "diff") {
          params.set("from", request.from);
          params.set("to", request.to);
        } else {
          params.set("ref", request.ref);
        }
        params.set("v", String(Date.now()));
        return fetchJsonMaybe(`/api/summary?${params.toString()}`);
      }

      function clearHoverSummaryTimer() {
        if (state.hoverSummaryTimerId) {
          clearTimeout(state.hoverSummaryTimerId);
          state.hoverSummaryTimerId = 0;
        }
      }

      function scheduleHoverSummary(node) {
        const request = summaryRequestForNode(node);
        const key = summaryKeyForRequest(request);
        if (!key) {
          state.hoverSummaryKey = "";
          clearHoverSummaryTimer();
          return;
        }
        const existing = state.summaryByKey.get(key);
        if (existing && existing.status === "ready") return;
        if (state.hoverSummaryKey === key && state.hoverSummaryTimerId) return;
        clearHoverSummaryTimer();
        state.hoverSummaryKey = key;
        state.hoverSummaryTimerId = window.setTimeout(async () => {
          state.hoverSummaryTimerId = 0;
          state.summaryByKey.set(key, { status: "pending" });
          const payload = await fetchUnifiedSummary(request, true);
          if (!payload) return;
          state.summaryByKey.set(key, payload);
          if (!state.currentTooltipNode) return;
          const currentRequest = summaryRequestForNode(state.currentTooltipNode);
          const currentKey = summaryKeyForRequest(currentRequest);
          if (currentKey !== key) return;
          const kind = state.currentTooltipNode.nodeType || (state.currentTooltipNode.isDir ? "Directory" : "File");
          const location = state.currentTooltipNode.path || state.currentTooltipNode.name;
          controls.tooltip.textContent = formatNodeTooltip(state.currentTooltipNode, kind, location);
        }, 1000);
      }

      function showNodeTooltip(event, node) {
        state.currentTooltipNode = node;
        const kind = node.nodeType || (node.isDir ? "Directory" : "File");
        const location = node.path || node.path === "" ? node.path : node.name;
        const baseSummary = formatNodeTooltip(node, kind, location);
        controls.tooltip.style.display = "block";
        controls.tooltip.textContent = baseSummary;
        positionTooltip(event.clientX, event.clientY);
        scheduleHoverSummary(node);
      }

      function positionTooltip(cursorX, cursorY) {
        const tooltip = controls.tooltip;
        const margin = 10;
        const baseX = cursorX + 10;
        const baseY = cursorY + 10;
        const tooltipWidth = tooltip.offsetWidth;
        const tooltipHeight = tooltip.offsetHeight;
        const maxX = window.innerWidth - tooltipWidth - margin;
        const maxY = window.innerHeight - tooltipHeight - margin;
        const x = Math.max(margin, Math.min(baseX, maxX));
        const y = Math.max(margin, Math.min(baseY, maxY));
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y}px`;
      }

      function formatNodeTooltip(node, kind, location) {
        const changeSummary = formatChangeSummary(node);
        let summaryText = "";
        const request = summaryRequestForNode(node);
        const key = summaryKeyForRequest(request);
        if (key) {
          const summary = state.summaryByKey.get(key);
          if (summary && summary.status === "ready" && summary.oneLine && summary.paragraph) {
            summaryText = `${summary.oneLine}\n\n${summary.paragraph}\n\n`;
          } else if (summary && summary.status === "pending") {
            summaryText = "AI summary loading…\n\n";
          }
        }
        return `${node.name}
${summaryText}${kind} · ${formatNodeMagnitude(node)}
${changeSummary ? `${changeSummary}\n` : ""}Path: ${location}`;
      }

      function formatChangeSummary(node) {
        if (!node || !node.hasDiff) return "";
        const added = Math.max(0, Number(node.addedLines) || 0);
        const deleted = Math.max(0, Number(node.deletedLines) || 0);
        const status = node.isDir ? "aggregate" : String(node.changeStatus || "modified");
        return `Change (${status}) · +${formatCount(added)} / -${formatCount(deleted)} (activity ${formatCount(added + deleted)} lines)`;
      }

      function formatCount(value) {
        return Number(value || 0).toLocaleString();
      }

      function formatNodeMagnitude(node) {
        if (state.changedOnly && isComparisonMode()) {
          const added = Math.max(0, Number(node && node.addedLines) || 0);
          const deleted = Math.max(0, Number(node && node.deletedLines) || 0);
          return `${formatCount(added + deleted)} changed lines`;
        }
        return formatBytes(node.value);
      }

      function deriveChangeBandFractions(node, diffOnly) {
        if (!node || node.isDir || !node.hasDiff) {
          return diffOnly
            ? { addFrac: 0, delFrac: 0, keepFrac: 0 }
            : { addFrac: 0, delFrac: 0, keepFrac: 1 };
        }
        const status = String(node.changeStatus || "modified");
        const added = Math.max(0, Number(node.addedLines) || 0);
        const deleted = Math.max(0, Number(node.deletedLines) || 0);
        if (status === "added" && deleted === 0) {
          return { addFrac: 1, delFrac: 0, keepFrac: 0 };
        }
        if (status === "deleted" && added === 0) {
          return { addFrac: 0, delFrac: 1, keepFrac: 0 };
        }
        if (added === 0 && deleted === 0) {
          return diffOnly
            ? { addFrac: 0, delFrac: 0, keepFrac: 0 }
            : { addFrac: 0, delFrac: 0, keepFrac: 1 };
        }
        if (!diffOnly) {
          const oldLines = Math.max(deleted, Number(node.oldLinesBefore) || 0);
          const unchanged = Math.max(0, oldLines - deleted);
          const total = added + deleted + unchanged;
          if (!Number.isFinite(total) || total <= 0) {
            return { addFrac: 0, delFrac: 0, keepFrac: 1 };
          }
          return {
            addFrac: added / total,
            delFrac: deleted / total,
            keepFrac: unchanged / total,
          };
        }
        const total = added + deleted;
        if (!Number.isFinite(total) || total <= 0) {
          return { addFrac: 0, delFrac: 0, keepFrac: 0 };
        }
        return {
          addFrac: added / total,
          delFrac: deleted / total,
          keepFrac: 0,
        };
      }

      function renderChangeBands(cell, node) {
        const width = Math.max(0, node.x1 - node.x0);
        const height = Math.max(0, node.y1 - node.y0);
        if (width <= 0 || height <= 0) return;
        const diffOnly = state.changedOnly && isComparisonMode();
        const { addFrac, delFrac, keepFrac } = deriveChangeBandFractions(node, diffOnly);
        const addedLines = Math.max(0, Number(node.addedLines) || 0);
        const deletedLines = Math.max(0, Number(node.deletedLines) || 0);
        let greenH = height * addFrac;
        let redH = height * delFrac;
        let middleH = height * keepFrac;
        const minBandPx = height >= 10 ? 1.4 : height >= 6 ? 1 : 0.6;
        if (addedLines > 0 && addFrac < 1) {
          greenH = Math.max(greenH, minBandPx);
        }
        if (deletedLines > 0 && delFrac < 1) {
          redH = Math.max(redH, minBandPx);
        }
        if (diffOnly) {
          middleH = 0;
          const coloredTotal = greenH + redH;
          if (coloredTotal > 0) {
            const stretch = height / coloredTotal;
            greenH *= stretch;
            redH *= stretch;
          }
        } else {
          middleH = Math.max(0, height - greenH - redH);
        }
        const totalH = middleH + greenH + redH;
        if (totalH > height && totalH > 0) {
          const shrink = height / totalH;
          middleH *= shrink;
          greenH *= shrink;
          redH *= shrink;
        }
        if (!diffOnly && middleH > 0.2) {
          const unchangedRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          unchangedRect.setAttribute("x", String(node.x0));
          unchangedRect.setAttribute("y", String(node.y0));
          unchangedRect.setAttribute("width", String(width));
          unchangedRect.setAttribute("height", String(middleH));
          unchangedRect.setAttribute("fill", "rgba(145, 154, 183, 0.58)");
          unchangedRect.setAttribute("pointer-events", "none");
          cell.appendChild(unchangedRect);
        }
        if (redH > 0.2) {
          const deletedRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          deletedRect.setAttribute("x", String(node.x0));
          deletedRect.setAttribute("y", String(node.y0 + middleH));
          deletedRect.setAttribute("width", String(width));
          deletedRect.setAttribute("height", String(redH));
          deletedRect.setAttribute("fill", "rgba(214, 82, 82, 0.84)");
          deletedRect.setAttribute("pointer-events", "none");
          cell.appendChild(deletedRect);
        }
        if (greenH > 0.2) {
          const addedRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          addedRect.setAttribute("x", String(node.x0));
          addedRect.setAttribute("y", String(node.y0 + middleH + redH));
          addedRect.setAttribute("width", String(width));
          addedRect.setAttribute("height", String(greenH));
          addedRect.setAttribute("fill", "rgba(59, 183, 106, 0.84)");
          addedRect.setAttribute("pointer-events", "none");
          cell.appendChild(addedRect);
        }
      }

      function fillColorForNode(node, maxDepth) {
        if (node.isDir) return colorForNode(node, maxDepth);
        if (state.vizMode === "changeBands") return "rgba(129, 140, 171, 0.55)";
        return colorForNode(node, maxDepth);
      }

      function updateDiffInfo() {
        if (!controls.diffInfo) return;
        const meta = state.diffMeta || {};
        const diff = meta.diff;
        const tree = meta.tree;
        if (tree) {
          const ref = tree.ref || tree.resolved || String(controls.fromRef.value || "").trim() || "unknown";
          controls.diffInfo.textContent = `Showing commit: ${ref}`;
          return;
        }
        if (diff) {
          const from = diff.from || "unknown";
          const to = diff.to || "unknown";
          controls.diffInfo.textContent = `Comparing: ${to} against ${from}`;
          return;
        }
        controls.diffInfo.textContent = "Showing: current workspace snapshot";
      }

      function updateLoadStatus() {
        if (!controls.loadStatus) return;
        const meta = state.lastLoadMeta;
        const stats = meta && meta.stats ? meta.stats : null;
        if (!stats) {
          controls.loadStatus.textContent = "";
          return;
        }
        const rowsNum = Number(stats.rows || 0);
        const rows = rowsNum.toLocaleString();
        const visibleNum = Number(state.visibleFileCount || 0);
        const visible = visibleNum.toLocaleString();
        const buildMs = Number(stats.buildMs || 0);
        if (Number.isFinite(Number(stats.changedFiles))) {
          const changed = Number(stats.changedFiles || 0).toLocaleString();
          controls.loadStatus.textContent =
            rowsNum === visibleNum
              ? `Changed files: ${changed} / ${rows}, build: ${buildMs} ms`
              : `Changed files: ${changed} / ${rows}, shown: ${visible}, build: ${buildMs} ms`;
          return;
        }
        controls.loadStatus.textContent =
          rowsNum === visibleNum
            ? `Files: ${rows}, build: ${buildMs} ms`
            : `Files: ${visible} shown (${rows} loaded), build: ${buildMs} ms`;
      }

      function hideTooltip() {
        state.currentTooltipNode = null;
        state.hoverSummaryKey = "";
        clearHoverSummaryTimer();
        controls.tooltip.style.display = "none";
      }

      function flattenNodes(node, out) {
        if (!node) return;
        if (node.depth > 0 && node.value > 0) {
          out.push(node);
        }
        if (!node.children) return;
        for (const child of node.children) {
          flattenNodes(child, out);
        }
      }

      function shouldShowFileLabel(node) {
        if (!hasFiniteRect(node)) return false;
        if (node.isDir) return false;
        const width = node.x1 - node.x0;
        const height = node.y1 - node.y0;
        if (width < 44 || height < 18) return false;
        if (state.changedOnly && isComparisonMode()) return true;
        return node.value >= 2500;
      }

      function shouldShowDirHeader(node) {
        if (!hasFiniteRect(node)) return false;
        if (!node.isDir) return false;
        return node.depth > 0 && node.value > 0;
      }

      function layoutNode(node, x0, y0, x1, y1) {
        if (!Number.isFinite(x0) || !Number.isFinite(y0) || !Number.isFinite(x1) || !Number.isFinite(y1)) return;
        if (!node) return;
        node.x0 = x0;
        node.y0 = y0;
        node.x1 = x1;
        node.y1 = y1;

        if (!node.children || node.children.length === 0) return;
        if (node.value <= 0) {
          for (const child of node.children) {
            child.x0 = x0;
            child.y0 = y0;
            child.x1 = x1;
            child.y1 = y1;
          }
          return;
        }

        const innerX0 = x0 + padding;
        const innerY0 = y0 + padding;
        const innerX1 = x1 - padding;
        const innerY1 = y1 - padding;
        if (innerX1 <= innerX0 || innerY1 <= innerY0) return;
        layoutSquarify(node, innerX0, innerY0, innerX1, innerY1, phi);

        for (const child of node.children) {
          layoutNode(child, child.x0, child.y0, child.x1, child.y1);
        }
      }

      function layoutBinary(parent, x0, y0, x1, y1) {
        const nodes = parent.children;
        if (!nodes.length) return;
        const sums = new Array(nodes.length + 1);
        let sum = 0;
        for (let i = 0; i < nodes.length; i++) {
          sum += nodes[i].value;
          sums[i + 1] = sum;
        }

        partition(0, nodes.length, parent.value, x0, y0, x1, y1);

        function partition(i, j, value, xa, ya, xb, yb) {
          if (i >= j - 1) {
            const node = nodes[i];
            node.x0 = xa;
            node.y0 = ya;
            node.x1 = xb;
            node.y1 = yb;
            return;
          }

          const valueOffset = sums[i];
          const valueTarget = (value / 2) + valueOffset;
          let k = i + 1;
          const hi = j - 1;

          while (k < hi) {
            const mid = (k + hi) >>> 1;
            if (sums[mid] < valueTarget) k = mid + 1;
            else hi = mid;
          }
          if ((valueTarget - sums[k - 1]) < (sums[k] - valueTarget) && i + 1 < k) --k;

          const valueLeft = sums[k] - valueOffset;
          const valueRight = value - valueLeft;

          if ((xb - xa) > (yb - ya)) {
            const xk = value ? (xa * valueRight + xb * valueLeft) / value : xb;
            partition(i, k, valueLeft, xa, ya, xk, yb);
            partition(k, j, valueRight, xk, ya, xb, yb);
          } else {
            const yk = value ? (ya * valueRight + yb * valueLeft) / value : yb;
            partition(i, k, valueLeft, xa, ya, xb, yk);
            partition(k, j, valueRight, xa, yk, xb, yb);
          }
        }
      }

      function layoutSliceDice(parent, x0, y0, x1, y1) {
        if ((parent.depth & 1) === 1) {
          layoutSlice(parent, x0, y0, x1, y1);
        } else {
          layoutDice(parent, x0, y0, x1, y1);
        }
      }

      function layoutSlice(parent, x0, y0, x1, y1) {
        const nodes = parent.children;
        const k = parent.value ? (y1 - y0) / parent.value : 0;
        let y = y0;
        for (const node of nodes) {
          const h = node.value * k;
          node.x0 = x0;
          node.x1 = x1;
          node.y0 = y;
          node.y1 = y + h;
          y = node.y1;
        }
      }

      function layoutDice(parent, x0, y0, x1, y1) {
        const nodes = parent.children;
        const k = parent.value ? (x1 - x0) / parent.value : 0;
        let x = x0;
        for (const node of nodes) {
          const w = node.value * k;
          node.y0 = y0;
          node.y1 = y1;
          node.x0 = x;
          node.x1 = x + w;
          x = node.x1;
        }
      }

      function layoutSquarify(parent, x0, y0, x1, y1, ratio) {
        const nodes = parent.children;
        if (!nodes.length) return;
        const rows = [];
        let i0 = 0;
        let i1 = 0;
        const n = nodes.length;
        let value = parent.value;
        let minValue;
        let maxValue;
        let nodeValue;
        let sumValue;
        let row;
        let newRatio;
        let minRatio;
        let alpha;
        let beta;

        while (i0 < n) {
          const dx = x1 - x0;
          const dy = y1 - y0;
          do {
            sumValue = nodes[i1].value;
            i1 += 1;
          } while (!sumValue && i1 < n);
          if (!sumValue) break;

          minValue = maxValue = sumValue;
          alpha = Math.max(dy / dx, dx / dy) / (value * ratio);
          beta = sumValue * sumValue * alpha;
          minRatio = Math.max(maxValue / beta, beta / minValue);

          for (; i1 < n; ++i1) {
            sumValue += nodeValue = nodes[i1].value;
            if (!nodeValue) continue;
            if (nodeValue < minValue) minValue = nodeValue;
            if (nodeValue > maxValue) maxValue = nodeValue;
            beta = sumValue * sumValue * alpha;
            newRatio = Math.max(maxValue / beta, beta / minValue);
            if (newRatio > minRatio) {
              sumValue -= nodeValue;
              break;
            }
            minRatio = newRatio;
          }

          row = {
            value: sumValue,
            dice: dx < dy,
            children: nodes.slice(i0, i1),
          };
          if (row.dice) {
            const y2 = value ? y0 + (dy * sumValue) / value : y1;
            layoutDice(row, x0, y0, x1, y2);
            y0 = y2;
          } else {
            const x2 = value ? x0 + (dx * sumValue) / value : x1;
            layoutSlice(row, x0, y0, x2, y1);
            x0 = x2;
          }

          rows.push(row);
          value -= sumValue;
          i0 = i1;
        }
      }

      function hasFiniteRect(node) {
        return (
          node &&
          Number.isFinite(node.x0) &&
          Number.isFinite(node.y0) &&
          Number.isFinite(node.x1) &&
          Number.isFinite(node.y1)
        );
      }

      function colorForNode(node, maxDepth) {
        const tone = Math.floor((node.depth / Math.max(1, maxDepth)) * 70);
        if (node.isDir) {
          const sat = 55 + tone;
          return `hsl(220, ${sat}%, ${42 + ((node.depth * 5) % 14)}%)`;
        }
        const fileTone = (n) => Math.min(18, Math.max(8, node.depth * 2));
        const filePalette = {
          ml: `hsl(205, ${72 + tone}%, ${50 + fileTone()}%)`,
          mli: `hsl(224, ${66 + tone}%, ${55 + fileTone()}%)`,
          mll: `hsl(35, ${63 + tone}%, ${54 + fileTone()}%)`,
          mly: `hsl(44, ${60 + tone}%, ${48 + fileTone()}%)`,
          c: `hsl(24, ${62 + tone}%, ${50 + fileTone()}%)`,
          h: `hsl(15, ${58 + tone}%, ${55 + fileTone()}%)`,
          cmm: `hsl(278, ${52 + tone}%, ${56 + fileTone()}%)`,
          s: `hsl(130, ${45 + tone}%, ${43 + fileTone()}%)`,
          asm: `hsl(9, ${54 + tone}%, ${56 + fileTone()}%)`,
        };
        return filePalette[node.extension] || `hsl(32, ${58 + tone}%, ${53 + ((node.depth * 3) % 9)}%)`;
      }

      function shortLabel(name, width, height) {
        const base = String(name).replace(/^.*\//, "");
        const slots = Math.floor((width - 8) / 6.8);
        if (slots < 1 || height < 10 || base.length === 0) return "";
        if (base.length <= slots) return base;
        if (slots <= 1) return base[0];
        if (slots === 2) return `${base[0]}…`;
        return `${base.slice(0, Math.max(2, slots - 1))}…`;
      }

      function nodeCount(node) {
        let count = 0;
        if (node.depth > 0 && !node.isDir) count += 1;
        if (!node.children) return count;
        for (const child of node.children) {
          count += nodeCount(child);
        }
        return count;
      }

      function headerRectIntersects(a, b) {
        if (a.x1 <= b.x0 || a.x0 >= b.x1 || a.y1 <= b.y0 || a.y0 >= b.y1) return false;
        return true;
      }

      function isNestedPath(aPath, bPath) {
        if (!aPath || !bPath) return false;
        return aPath === bPath || bPath.startsWith(`${aPath}/`) || aPath.startsWith(`${bPath}/`);
      }

      function hasHeaderCollision(rect, list, path) {
        for (const item of list) {
          if (!isNestedPath(path, item.path)) continue;
          if (headerRectIntersects(rect, item.rect)) return true;
        }
        return false;
      }

      function placeDirHeader(node, baseHeight, occupied) {
        if (!hasFiniteRect(node)) return null;
        const width = node.x1 - node.x0;
        const height = node.y1 - node.y0;
        const headerHeight = Math.max(8, Math.min(baseHeight, Math.max(8, height - 3)));
        const headerWidth = Math.max(0, width - 6);
        const startY = node.y0 + 2;
        const maxY = node.y1 - headerHeight - 2;
        if (headerWidth < 4 || headerHeight < 6 || !Number.isFinite(height) || height < 1) return null;

        const margin = 2;
        if (startY > maxY) {
          return { y0: startY };
        }
        for (let y = startY; y <= maxY; y += 3) {
          const candidate = {
            x0: node.x0 + 3 + margin,
            x1: node.x0 + 3 + headerWidth - margin,
            y0: y + margin,
            y1: y + headerHeight - margin,
          };
          if (!hasHeaderCollision(candidate, occupied, node.path)) {
            return { y0: y };
          }
        }
        return null;
      }

      function formatBytes(bytes) {
        if (bytes >= 1024 * 1024 * 1024) {
          return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GB`;
        }
        if (bytes >= 1024 * 1024) {
          return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
        }
        if (bytes >= 1024) {
          return `${(bytes / 1024).toFixed(2)} KB`;
        }
        return `${bytes} B`;
      }

      function debounce(fn, wait) {
        let t;
        return () => {
          clearTimeout(t);
          t = setTimeout(fn, wait);
        };
      }
    </script>
  </body>
</html>
